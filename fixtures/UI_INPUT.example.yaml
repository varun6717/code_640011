# UI_INPUT.yaml — slice-1 locked example
# Phase-0 / TASK-002 proof artifact; consumed by TASK-031 (generate.py scaffolder).
# Conforms to TECH_SPEC §3.1. Immutable post-Generate; re-config = new run_id.

run_id: r-2026-06-17-001            # assigned by Generate
schema_version: 1
working_path: /work/pbi/SEAL-12345-routing
domain: payment_brand               # selects profiles/templates/adapter/vocabulary (UI label "PBI")
runtime_tool: copilot               # claude | copilot  (FR-XS-06)
registry_sha: 7d2e9a1               # resolved & pinned at Generate (FR-XS-10, NFR-01)
# registry_url: "https://bitbucket.jpmc.net/scm/pbi/cmspbiaiml-commerce-interchange-app.git"
#                                   # OPTIONAL — the live registry repo to hydrate from. Omit to
#                                   # use the env / repo-root registry (external build).
# registry_ref: feature/pdlc_app    # OPTIONAL branch/tag the registry lives on; hydrate.py clones
#                                   # it so the pinned SHA is reachable (one-repo/two-feature layout).

# project identity / governance metadata — config only; feeds traceability + later Jira controls
project_metadata:
  project_name:     "Discover Brand Routing"     # also seeds frame.title
  application_name: "MerchantRoutingSvc"          # replaces a project-level Seal ID for MVP
  line_of_business: "Merchant Services"
  requestor:        "Varun Munjal"
  requestor_sid:    "vmunjal"                      # user / LDAP id

# requirement frame — the operator's seed that orients BRD authoring (the author fills the rest)
frame:
  title: "Discover Brand Routing"
  intent: "Implement Discover as a routable card brand end-to-end"
  scope_hints: ["routing", "settlement reconciliation touchpoints"]
  stakeholders: ["Payments Eng", "Brand Compliance"]
  key_dates: { compliance_deadline: 2026-09-30 }

# configured sources — slice 1: one PDF + one Stratus C repo. auth resolved at the seam, never inline.
sources:
  - type: file                      # PDF document source by direct path (TASK-020 → core/scripts/ingest_file.py)
    path: "fixtures/pdf/mastercard_mandate_part1_2026.pdf"   # local raw document staged for pdf_extract
    source: sharepoint              # logical provenance label (partitions context_set/<source>/)
    # Phase-5 deferred: pull this PDF from SharePoint via a "write one more connector"
    #   ingest_sharepoint.py (§11) — source-type-keyed, same descriptor contract; nothing
    #   downstream changes. It would carry: type: sharepoint, url, auth_ref: jpmc_adapters:sharepoint.
  - type: bitbucket                 # code source → git clone into repo/ for code_map
    seal_id: SEAL-12345
    repo_url: "https://bitbucket.jpmc.net/scm/pbi/merchant-routing-svc.git"
    # ref: feature/c_repo           # OPTIONAL branch/tag/commit — clone.py pins to it (--ref);
    #                               # omit to clone the repo's default branch. Needed for a
    #                               # one-repo/two-feature layout (code on a feature branch).
    auth_ref: jpmc_adapters:bitbucket

# gate threshold — soft-gate default (§9); per-gate override optional
gates:
  score_threshold: 85

