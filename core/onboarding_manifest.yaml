# core/onboarding_manifest.yaml — frozen extractors + per-repo content hashes (§5.2).
#
# This is the freeze record for the code-impact substrate (FR-DC-14/FR-DC-16). It
# pins, per language, WHICH deterministic extractor is frozen and the content hash
# that maps were built against — the reproducibility/audit anchor of the code map.
# The gate (§5.3, TASK-013) reads ONLY this file's deterministic signals to decide
# onboard / reuse / rebuild; no model participates in that decision.
#
# Freeze discipline (TASK-012): the model proposed/validated the extractor; a HUMAN
# freezes it by committing this manifest. `extractor_sha` is the git blob hash of
# the frozen file — `core/scripts/validate_onboarding.py` asserts the recorded sha
# still matches the live file, so a post-freeze edit cannot pass silently.
#
# Reserved-but-inert hooks (ADR-003, behavior-free in this slice — the same
# discipline that reserved `external_calls`/`exposes` in §3.3 / FR-DC-13):
#   - `adequacy_threshold` + `vocab_sha` (top level)
#   - `built_with_vocab_sha` (per repo)
# They are consumed by TASK-013's gate cache key + L1 adequacy detector. While the
# single domain's vocabulary is frozen (D5) `vocab_sha` is constant, so a future
# human-gated vocabulary amendment is additive — it bumps the version and re-tags,
# never reshapes the cache key.

schema_version: 1

extractors:
  - language: c
    extractor: core/extractors/c_extractor.py
    extractor_sha: 125a6ca                 # git blob hash of the frozen extractor (TASK-012 freeze)
    tools_required: [tree-sitter==0.25.2, tree-sitter-c==0.24.2]   # pip deps, imported in-venv (ADR-001); not PATH binaries
    file_globs: ["*.c", "*.h"]
    coverage_floor: 0.80                    # below this on a repo build → REONBOARD_FLAG (FR-DC-16, §5.4)
    frozen_at: 2026-06-20T00:00:00Z
    frozen_by: vmunjal

adequacy_threshold: 0.20                     # untagged_ratio above this → VOCAB_GAP_FLAG (ADR-003 / FR-DC-21, §5.4.1)
                                             #   reserved hook — consumed by TASK-013's L1 detector; inert while D5 is frozen
vocab_sha: d5frozen                          # version of the domain vocabulary the maps below were tagged under
                                             #   (reserved per ADR-003; constant while the payment_brand vocabulary is frozen)

repos:
  - repo: merchant-routing-svc              # the slice-1 Stratus C target (fixtures/c_repo models it)
    seal_id: SEAL-PBI-0001
    language: c
    content_hash: e94c70d                   # == the oracle's commit_sha (fixtures/c_repo @ TASK-005 sign-off)
    built_with_extractor_sha: 125a6ca       # ties the map to the frozen extractor above
    built_with_vocab_sha: d5frozen          # vocabulary version the map's tags were assigned under (ADR-003);
                                            #   a mismatch invalidates the cache → re-tag pass (§5.3 Branch B)
    code_map_path: context_set/code_map.json
    last_built: 2026-06-20T00:00:00Z
