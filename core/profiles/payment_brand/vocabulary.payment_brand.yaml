# vocabulary.payment_brand.yaml — the canonical Payment Brand tag vocabulary.
#
# Verbatim transcription of REQUIREMENTS D5 (the normative 12-tag table). This file
# is the SINGLE SOURCE OF TRUTH for the domain's tag set (D5): every profile
# `requirements[].topic` (TASK-015/016), every `tags[]` the adapter and `code_map.json`
# emit, and the adequacy detector all point here. It is FROZEN — no tag may be added
# or renamed (that would ripple D5). The set may later be *extended* (never redefined)
# only through the human-gated vocabulary-adequacy loop (FR-DC-21, deferred L2), which
# bumps `vocab_sha`.
#
# Consumed by the build checks:
#   §10.1 — loads the tag set V; asserts profile topics ⊆ V and code_map tags ⊆ V.
#   §10.5 — `emitted_by` here MUST equal `adapter.yaml`'s emit map (no drift).
#
# ── r2 amendment (TASK-017 — emit-map reconciliation; V-approved) ─────────────────────
# The §10.5 no-drift check compares this `emitted_by` column, per tag, to adapter.yaml's
# emit-map. Authoring adapter.yaml surfaced FOUR drifts vs §6.6.3 (only mandate/F1 was
# documented). Two were vocab transcription gaps fixed HERE; two were adapter gaps fixed
# in adapter.yaml. The TAG SET is unchanged — only `emitted_by` metadata moved:
#   • card_brand, message_format — D5 flags both `code_tag: true` and `code_map_build`
#     (CODE_MAP_TAGS) genuinely emits them, but this column dropped `code_map_build` for
#     these two (it lists it for the other four code tags). Added below. [Class 2]
#   • mandate, transaction_flow — this column was already correct (both list a doc skill
#     the §6.6.3 adapter omitted); adapter.yaml was aligned to THIS instead. [Class 1]
# NOTE for the port: the external REQUIREMENTS.md D5 table is now reconciled to this column
# (TASK-061 added code_map_build to card_brand/message_format) — carry the same fix into the
# JPMC-side D5 at port. `vocab_sha` bumped d5frozen → d5frozen-r2.
#
# Reserved version header (ADR-003, additive — matches onboarding_manifest.yaml).
domain: payment_brand
vocab_sha: d5frozen-r4               # r2: +code_map_build on card_brand & message_format (TASK-017);
                                     # r3: +confluence_tag on the 6 KB tags (TASK-063B docs_pipeline confluence lane);
                                     # r4: change_type_assess REMOVED — its 5 doc tags re-homed to article_summarize
                                     #     (mandate, card_brand, routing, certification, compliance_deadline); the
                                     #     change_type field is dropped entirely. See notes/change_type_removal.md.
schema_version: 1

# Each tag carries D5's four columns verbatim: definition, emitted_by (adapter skill),
# consumed_by, and code_tag (D5 "Code tag?"). `emitted_by` is the §10.5 no-drift target.
tags:
  mandate:
    definition: "The originating brand mandate, its ID and compliance deadline"
    # F1 RESOLVED (TASK-017, V-approved, Class 1): mandate was emitted by BOTH skills.
    # r4: change_type_assess removed — article_summarize is now the sole doc emitter.
    emitted_by: [article_summarize]
    consumed_by: ["BRD business_context"]
    code_tag: false

  brand_rules:
    definition: "Brand technical/operational rules constraining implementation"
    # r3 (TASK-063B): +confluence_tag — the confluence docs_pipeline lane emits it (KB describes brand rules).
    emitted_by: [article_summarize, confluence_tag]
    consumed_by: ["BRD business_context", "FRD system_behavior"]
    code_tag: false

  card_brand:
    definition: "Which card brand(s) the work concerns"
    # r2 (TASK-017, Class 2): +code_map_build — code_tag:true and code_map_build (CODE_MAP_TAGS)
    # emits it; this column had dropped it. Now matches adapter.yaml code_pipeline.
    # r3 (TASK-063B): +confluence_tag — the confluence lane emits it (KB names card brands).
    # r4: change_type_assess → article_summarize (its doc-side emission re-homed).
    emitted_by: [article_summarize, code_map_build, confluence_tag]
    consumed_by: ["BRD scope", "code routing"]
    code_tag: true

  routing:
    definition: "Transaction routing to brand handlers"
    # r3 (TASK-063B): +confluence_tag — the confluence lane emits it (KB describes routing).
    # r4: change_type_assess → article_summarize (its doc-side emission re-homed).
    emitted_by: [article_summarize, code_map_build, confluence_tag]
    consumed_by: ["BRD/FRD routing_behavior"]
    code_tag: true

  message_format:
    definition: "Message/wire formats and field-level changes"
    # r2 (TASK-017, Class 2): +code_map_build — code_tag:true and code_map_build (CODE_MAP_TAGS)
    # emits it; this column had dropped it. Now matches adapter.yaml code_pipeline.
    # r3 (TASK-063B): +confluence_tag — the confluence lane emits it (KB documents message formats).
    emitted_by: [article_summarize, code_map_build, confluence_tag]
    consumed_by: ["FRD data_contracts"]
    code_tag: true

  certification:
    definition: "Brand certification / conformance requirements"
    # r4: change_type_assess removed — re-homed to article_summarize (sole doc emitter).
    emitted_by: [article_summarize]
    consumed_by: ["BRD requirements", "FRD nfrs"]
    code_tag: false

  settlement:
    definition: "Settlement / reconciliation behavior"
    emitted_by: [code_map_build]
    consumed_by: ["BRD change-impact", "FRD system_behavior"]
    code_tag: true

  transaction_flow:
    definition: "End-to-end transaction lifecycle steps"
    # r3 (TASK-063B): +confluence_tag — the confluence lane emits it (KB describes the txn flow).
    emitted_by: [article_summarize, code_map_build, confluence_tag]
    consumed_by: ["FRD actor_flows"]
    code_tag: true

  error_handling:
    definition: "Failure modes, error codes, retry/fallback"
    # r3 (TASK-063B): +confluence_tag — was code-only; the confluence lane now also emits it
    # (KB describes failure modes / error codes / fallback). Confirmed against the KB fixture.
    emitted_by: [code_map_build, confluence_tag]
    consumed_by: ["FRD error_states"]
    code_tag: true

  interchange_fees:
    definition: "Interchange / fee schedule impacts"
    emitted_by: [article_summarize]
    consumed_by: ["BRD requirements"]
    code_tag: false

  reporting:
    definition: "Reporting / downstream data obligations"
    emitted_by: [article_summarize]
    consumed_by: ["BRD success_metrics", "FRD data_contracts"]
    code_tag: false

  compliance_deadline:
    definition: "The hard date(s) the work must meet"
    # r4: change_type_assess removed — re-homed to article_summarize (sole doc emitter).
    emitted_by: [article_summarize]
    consumed_by: ["BRD constraints_assumptions"]
    code_tag: false
