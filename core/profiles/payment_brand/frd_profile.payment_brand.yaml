# frd_profile.payment_brand.yaml — the per-domain FRD completeness contract (D3a).
#
# Same shape as the BRD profile (D1): sections[] each carry id / functional_kind /
# sources / requirements[], where a topic is the unit that carries exactly one
# {must_capture, probe_if_missing, required}. `topics` is IMPLICIT (the distinct set of
# requirements[].topic) — NO standalone `topics:` field (FR-BR-10 applies here too).
#
# D3a additions over the BRD profile:
#   - per SECTION: `functional_kind` ∈ {actor_flow | system_behavior | data_contract |
#     error_state | nfr}. Drives frd_validator testability (§9.3): actor_flow /
#     system_behavior / data_contract / error_state require acceptance criteria; nfr
#     requires a measurable target instead. Every kind is used exactly once below.
#   - per TOPIC: `traces_to` (MANDATORY, FR-FR-06) — the BRD section / requirement id(s)
#     this functional item derives from. Each anchor resolves to a REAL anchor in
#     brd_profile.payment_brand.yaml (TASK-015): a section id (e.g. scope_objectives) or
#     section.topic (e.g. code_impact.routing). frd_validator scores traceability as
#     frd_topics_with_valid_traces_to / total (§9.3); bad anchors break G2.
#
# This profile deep-merges OVER the inline FRD baseline in frd_author.skill.md (D3a, same
# MVP decision as D2): the five behavioral baseline sections — actor_flows,
# system_behaviors, data_contracts, error_states, nfrs — are overridden by id, this
# profile supplying their functional_kind + sources + requirements. The baseline-only
# sections (traceability, executive_summary) carry no D5 vocab topic, so per §10.1
# (topics ⊆ vocabulary) they take no `requirements` here; they are produced from the
# skill structure (traceability is the BRD→FRD map machine-checked at G2).
#
# Topic membership (every topic is a D5 tag whose vocabulary `consumed_by` names an FRD
# section): transaction_flow → FRD actor_flows; routing / brand_rules / settlement →
# FRD system_behavior; message_format / reporting → FRD data_contracts; error_handling →
# FRD error_states; certification → FRD nfrs. The D3a example's `routing_behavior`
# section is realized as the `routing` topic inside system_behaviors.
#
# BRD-only tags carried NO FRD section here (their vocabulary `consumed_by` has no FRD
# entry): mandate, card_brand, interchange_fees, compliance_deadline. card_brand and
# mandate are nonetheless TRACED-FROM below (they motivate functional items); but
# interchange_fees and compliance_deadline are pure BRD business/compliance facts with no
# functional behavior — frd_author marks them out-of-scope in the traceability block at
# G2, satisfying the §9.3 hard rule (every BRD requirement traced OR marked out-of-scope).
#
# FR-FR-03: the detailed file/function-level code impact (kept business-framed in the BRD)
# is carried FORWARD into the functional sections here — system_behaviors (routing /
# settlement) and error_states hold that technical detail.
#
# Source routing follows each topic's `emitted_by` (vocabulary.payment_brand.yaml), same
# convention as the BRD profile: doc-emitted → [confluence, sharepoint]; code-emitted →
# [bitbucket]; a section's `sources` is the union over its topics.

domain: payment_brand

sections:
  # ── actor_flows (baseline override) — end-to-end transaction lifecycle ──
  # transaction_flow emitted_by [article_summarize (doc), code_map_build (code)] → both.
  - id: actor_flows
    functional_kind: actor_flow
    position: null                       # keep baseline order
    sources: [bitbucket, confluence, sharepoint]
    requirements:
      - topic: transaction_flow
        traces_to: [scope_objectives.card_brand, code_impact.routing]
        must_capture: "End-to-end transaction lifecycle for the in-scope brand(s): actors, ordered steps, decision points, and the pre/post state at each step, with acceptance criteria per flow. Derives from the BRD scope and the routing change."
        probe_if_missing: "What are the end-to-end transaction steps for this brand flow, from authorization through to the changed behavior?"
        required: true

  # ── system_behaviors (baseline override) — routing / brand-rule / settlement logic ──
  # Carries forward the file/function detail from the BRD code-impact work (FR-FR-03).
  # routing emitted_by [article_summarize (doc), code_map_build (code)]; brand_rules
  # [article_summarize (doc)]; settlement [code_map_build (code)] → union doc+code.
  - id: system_behaviors
    functional_kind: system_behavior
    position: null
    sources: [bitbucket, confluence, sharepoint]
    requirements:
      - topic: routing
        traces_to: [code_impact.routing, scope_objectives.card_brand]
        must_capture: "Per-brand routing behavior: inputs, decision logic, outputs, and idempotency, with the file/function-level detail carried forward from the BRD code-impact work (FR-FR-03) and acceptance criteria."
        probe_if_missing: "How is a transaction routed to a brand handler today, what changes, and what are the inputs and outputs of the new decision logic?"
        required: true
      - topic: brand_rules
        traces_to: [business_context.brand_rules, business_context.mandate]
        must_capture: "How the system enforces each brand technical/operational rule: the rule, the enforcing component, the observable behavior, and acceptance criteria."
        probe_if_missing: "Which brand rules does the system enforce, and how is each enforced and verified?"
        required: false
      - topic: settlement
        traces_to: [code_impact.settlement]
        must_capture: "Settlement / reconciliation system behavior: inputs, processing logic, outputs, and the shared-dependency ripples carried forward from code-impact (FR-FR-03), with acceptance criteria."
        probe_if_missing: "How does settlement or reconciliation behavior change, and what shared dependencies are affected?"
        required: false

  # ── data_contracts (baseline override) — message/wire formats + reporting records ──
  # message_format emitted_by [article_summarize]; reporting [article_summarize] → doc.
  - id: data_contracts
    functional_kind: data_contract
    position: null
    sources: [confluence, sharepoint]
    requirements:
      - topic: message_format
        traces_to: [business_context.brand_rules, business_context.mandate]
        must_capture: "Message / wire-format data contract: field-level definitions, types, required vs optional, and the before/after field changes, with acceptance criteria for conformance."
        probe_if_missing: "Which message fields change — names, types, required or optional — and what is the before/after contract?"
        required: true
      - topic: reporting
        traces_to: [success_metrics.reporting]
        must_capture: "Reporting / downstream data contract: emitted records, fields, destinations, and timing, with acceptance criteria for downstream consumers."
        probe_if_missing: "What reporting or downstream records does this change emit, with which fields and to which consumers?"
        required: false

  # ── error_states (baseline override) — failure modes for the changed paths ──
  # error_handling emitted_by [code_map_build (code)] → bitbucket. Carries FR-FR-03 detail.
  - id: error_states
    functional_kind: error_state
    position: null
    sources: [bitbucket]
    requirements:
      - topic: error_handling
        traces_to: [code_impact.routing, code_impact.settlement]
        must_capture: "Failure modes, error codes, retry/fallback behavior, and observable signals for each changed path, with the code-impact detail carried forward (FR-FR-03) and acceptance criteria per failure path."
        probe_if_missing: "What are the failure paths, error codes, and expected recovery or fallback behavior for the changed routing and settlement flows?"
        required: true

  # ── nfrs (baseline override) — certification as a measurable conformance target ──
  # certification emitted_by [article_summarize (doc)] → doc. functional_kind nfr ⇒ §9.3
  # requires a MEASURABLE TARGET (not acceptance criteria); must_capture states it.
  - id: nfrs
    functional_kind: nfr
    position: null
    sources: [confluence, sharepoint]
    requirements:
      - topic: certification
        traces_to: [requirements.certification]
        must_capture: "Brand certification / conformance as a measurable non-functional target: the conformance suite, the pass threshold, and any recertification the change triggers — a measurable target (per §9.3 nfr), not acceptance criteria."
        probe_if_missing: "What is the measurable certification or conformance target (suite plus pass criteria), and does the change trigger recertification?"
        required: true
