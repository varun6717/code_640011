# brd_profile.payment_brand.yaml — the per-domain BRD completeness contract (D1).
#
# Schema is normative per D1: sections[] each carry id / title / position / required /
# sources (section-level routing) / requirements[]. A topic is the unit that carries
# exactly one {must_capture, probe_if_missing, required}. `topics` is IMPLICIT — the
# distinct set of requirements[].topic — there is NO standalone `topics:` field (FR-BR-10).
#
# This profile merges OVER the inline baseline in brd_author.skill.md (D2 merge, by id):
#   - ids matching a baseline section (business_context, scope_objectives, requirements,
#     success_metrics, constraints_assumptions) DEEP-MERGE — this profile supplies their
#     sources + requirements, and may raise `required` (never drop a baseline-required one).
#   - `code_impact` is NET-NEW — inserted at its `position`.
# Baseline sections this profile does not touch (stakeholders, current_state, out_of_scope,
# executive_summary) keep their baseline skeleton; they carry no D5 vocab topic, so per
# §10.1 (topics ⊆ vocabulary) they take no `requirements` here (a non-vocab topic would
# fail the build). They are satisfied from the UI frame / skill structure, not tag routing.
#
# Source routing follows each topic's `emitted_by` (vocabulary.payment_brand.yaml):
#   doc-emitted topics → sources: [confluence, sharepoint]  (document pipeline)
#   code-emitted topics → sources: [bitbucket]              (code pipeline, FR-BR-07)
# Every topic below is a tag in vocabulary.payment_brand.yaml (the 12-tag D5 set), and
# its placement mirrors that tag's `consumed_by`. message_format / transaction_flow /
# error_handling are FRD-only (consumed_by has no BRD section) → they live in the FRD
# profile (TASK-016), not here.

domain: payment_brand

sections:
  # ── business_context (baseline override) — mandate + brand rules from the article ──
  - id: business_context
    position: null                       # keep baseline order
    required: true
    sources: [confluence, sharepoint]
    requirements:
      - topic: mandate
        must_capture: "The originating brand mandate, its ID, and the compliance deadline."
        probe_if_missing: "Which brand mandate triggers this work, and what's the deadline?"
        required: true
      - topic: brand_rules
        must_capture: "Brand technical/operational rules constraining the implementation."
        probe_if_missing: "Which brand rules apply — message formats, cert requirements?"
        required: false

  # ── scope_objectives (baseline override) — which brand(s) and segments are in scope ──
  - id: scope_objectives
    position: null
    required: true
    sources: [confluence, sharepoint]
    requirements:
      - topic: card_brand
        must_capture: "Which card brand(s) the change concerns and the in-scope products/segments (e.g. commercial vs consumer, credit vs debit)."
        probe_if_missing: "Which card brand(s) and product segments are in scope for this change?"
        required: true

  # ── requirements (baseline override) — certification + fee-schedule obligations ──
  - id: requirements
    position: null
    required: true
    sources: [confluence, sharepoint]
    requirements:
      - topic: certification
        must_capture: "Brand certification / conformance requirements the change must satisfy, including any recertification it triggers and the target conformance suite."
        probe_if_missing: "Does this change trigger brand certification or recertification, and against which conformance requirements?"
        required: true
      - topic: interchange_fees
        must_capture: "Interchange or fee-schedule impacts introduced by the mandate (new rates, qualification criteria, or fee categories)."
        probe_if_missing: "Does this change affect interchange rates, fee categories, or qualification criteria?"
        required: false

  # ── code_impact (NET-NEW) — business-framed code change impact (FR-BR-07). ──
  # The agent DELEGATES to the `code_impact` subagent, drafts this BUSINESS-FRAMED
  # (impacted systems / scale / risk — NOT file/function detail; that detail is carried
  # forward to the FRD, FR-FR-03), and runs the human-mediated flag loop (FR-BR-08).
  # Sources: bitbucket (code pipeline) — its topics are code-emitted (code_map_build).
  - id: code_impact
    title: Code impact
    position: "after:requirements"
    required: true
    sources: [bitbucket]
    requirements:
      - topic: routing
        must_capture: "Business-framed impact on transaction routing to brand handlers — which systems/flows are affected, the scale of the change, and the risk (file/function detail is carried to the FRD, not stated here)."
        probe_if_missing: "Which routing flows or brand-handler systems does this change affect, and at what scale and risk?"
        required: true
      - topic: settlement
        must_capture: "Business-framed impact on settlement / reconciliation behavior, including shared-dependency ripples surfaced by code_impact and resolved through the flag loop."
        probe_if_missing: "Does this change affect settlement or reconciliation behavior, directly or via a shared dependency?"
        required: false

  # ── success_metrics (baseline override) — reporting obligations + measurable success ──
  - id: success_metrics
    position: null
    required: false                       # baseline does not mark success_metrics required
    sources: [confluence, sharepoint]
    requirements:
      - topic: reporting
        must_capture: "Reporting and downstream data obligations the change creates, and the measurable signals that confirm success."
        probe_if_missing: "What reporting or downstream data obligations does this change introduce, and how will success be measured?"
        required: false

  # ── constraints_assumptions (baseline override) — the hard compliance date. ──
  # Elevated to required:true for this domain: the compliance deadline is a hard date the
  # work must meet (D5 compliance_deadline), so the section cannot be left thin.
  - id: constraints_assumptions
    position: null
    required: true
    sources: [confluence, sharepoint]
    requirements:
      - topic: compliance_deadline
        must_capture: "The hard compliance date(s) the work must meet, plus any assumptions or delivery constraints tied to them."
        probe_if_missing: "What is the hard compliance deadline, and what assumptions or constraints does it place on delivery?"
        required: true
